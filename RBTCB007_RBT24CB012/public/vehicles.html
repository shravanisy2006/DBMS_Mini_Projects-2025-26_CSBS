<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vehicles | Vehicle Rental MS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🚗</div>
    <div><span>VehicleRent<br/><small>Management System</small></span></div>
  </div>
  <p class="nav-label">Navigation</p>
  <a href="index.html"     class="nav-item"><span class="icon">📊</span> Dashboard</a>
  <a href="vehicles.html"  class="nav-item active"><span class="icon">🚙</span> Vehicles</a>
  <a href="customers.html" class="nav-item"><span class="icon">👤</span> Customers</a>
  <a href="rentals.html"   class="nav-item"><span class="icon">📋</span> Rentals</a>
</aside>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Vehicles</div>
      <div class="topbar-subtitle">Manage your vehicle fleet</div>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Add Vehicle</button>
  </div>

  <div class="content">
    <div class="card">
      <div class="card-header">
        <span class="card-title">🚙 Vehicle Fleet</span>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search vehicles…" oninput="filterTable()"/>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>#</th><th>Brand & Model</th><th>Category</th><th>Year</th><th>License Plate</th><th>Price/Day</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="vehicleBody">
            <tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Vehicle</div>
    <form id="vehicleForm">
      <input type="hidden" id="vehicleId"/>
      <div class="form-grid">
        <div class="form-group">
          <label>Brand *</label>
          <input type="text" id="brand" placeholder="Toyota" required/>
        </div>
        <div class="form-group">
          <label>Model *</label>
          <input type="text" id="model" placeholder="Camry" required/>
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select id="category">
            <option>Car</option><option>SUV</option><option>Bike</option><option>Van</option><option>Truck</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year *</label>
          <input type="number" id="year" min="2000" max="2030" required/>
        </div>
        <div class="form-group">
          <label>License Plate *</label>
          <input type="text" id="license_plate" placeholder="MH01AB1234" required/>
        </div>
        <div class="form-group">
          <label>Price / Day (₹) *</label>
          <input type="number" id="price_per_day" min="0" step="0.01" required/>
        </div>
        <div class="form-group">
          <label>Color</label>
          <input type="text" id="color" placeholder="White"/>
        </div>
        <div class="form-group">
          <label>Fuel Type</label>
          <select id="fuel_type">
            <option>Petrol</option><option>Diesel</option><option>Electric</option><option>Hybrid</option>
          </select>
        </div>
        <div class="form-group">
          <label>Seats</label>
          <input type="number" id="seats" min="1" max="50" value="5"/>
        </div>
        <div class="form-group" id="statusGroup" style="display:none;">
          <label>Status</label>
          <select id="status">
            <option value="available">Available</option>
            <option value="rented">Rented</option>
            <option value="maintenance">Maintenance</option>
          </select>
        </div>
      </div>
    </form>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveVehicle()">Save Vehicle</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/utils.js"></script>
<script src="js/vehicles.js"></script>
</body>
</html>
