<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customers | Vehicle Rental MS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🚗</div>
    <div><span>VehicleRent<br/><small>Management System</small></span></div>
  </div>
  <p class="nav-label">Navigation</p>
  <a href="index.html"     class="nav-item"><span class="icon">📊</span> Dashboard</a>
  <a href="vehicles.html"  class="nav-item"><span class="icon">🚙</span> Vehicles</a>
  <a href="customers.html" class="nav-item active"><span class="icon">👤</span> Customers</a>
  <a href="rentals.html"   class="nav-item"><span class="icon">📋</span> Rentals</a>
</aside>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Customers</div>
      <div class="topbar-subtitle">Manage registered customers</div>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Add Customer</button>
  </div>

  <div class="content">
    <div class="card">
      <div class="card-header">
        <span class="card-title">👤 Customer List</span>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search customers…" oninput="filterTable()"/>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>#</th><th>Full Name</th><th>Email</th><th>Phone</th><th>License No.</th><th>Address</th><th>Actions</th></tr>
          </thead>
          <tbody id="customerBody">
            <tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Customer</div>
    <form id="customerForm">
      <input type="hidden" id="customerId"/>
      <div class="form-grid">
        <div class="form-group full">
          <label>Full Name *</label>
          <input type="text" id="full_name" placeholder="Rahul Sharma" required/>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" placeholder="rahul@email.com" required/>
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input type="tel" id="phone" placeholder="9876543210" required/>
        </div>
        <div class="form-group full">
          <label>Driving License No. *</label>
          <input type="text" id="license_number" placeholder="DL-1234567890" required/>
        </div>
        <div class="form-group full">
          <label>Address</label>
          <textarea id="address" placeholder="Enter full address…"></textarea>
        </div>
      </div>
    </form>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer()">Save Customer</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/utils.js"></script>
<script src="js/customers.js"></script>
</body>
</html>
